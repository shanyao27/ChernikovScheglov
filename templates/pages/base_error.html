{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Ошибка{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --ink:    #0a1628;
      --navy:   #0f2a5e;
      --blue:   #2563eb;
      --sky:    #60a5fa;
      --mist:   #bfdbfe;
      --pale:   #eff6ff;
      --fog:    #f8fafc;
      --white:  #ffffff;
    }

    body {
      background-color: var(--fog);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
    }

    .error-container {
      text-align: center;
      max-width: 700px;
      padding: 40px;
      background: var(--white);
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(15,42,94,0.1);
    }

    .error-image {
      max-width: 400px;
      margin-bottom: 30px;
    }

    h2 {
      color: var(--navy);
      font-weight: 700;
      font-size: 2.5rem;
      margin-bottom: 20px;
    }

    p {
      color: var(--slate);
      font-size: 1.1rem;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .btn-home {
      background: var(--blue);
      color: var(--white);
      padding: 12px 30px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 600;
      display: inline-block;
      transition: all 0.3s;
    }

    .btn-home:hover {
      background: var(--navy);
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(37,99,235,0.3);
      color: var(--white);
    }

    .btn-back {
      background: transparent;
      color: var(--blue);
      padding: 12px 30px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 600;
      display: inline-block;
      margin-right: 10px;
      border: 2px solid var(--blue);
      transition: all 0.3s;
    }

    .btn-back:hover {
      background: var(--blue);
      color: var(--white);
    }
  </style>
</head>
<body>
  <div class="error-container">
    {% block image %}{% endblock %}
    <div>
      <a href="javascript:history.back()" class="btn-back">← Назад</a>
      <a href="/" class="btn-home">На главную</a>
    </div>
  </div>
</body>
</html>
