{% extends "base.html" %}

{% block title %}Ожидание подтверждения{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card text-center">
      <div class="card-body p-5">
        <div class="mb-4">
          <i class="bi bi-hourglass-split" style="font-size: 5rem; color: var(--blue);"></i>
        </div>
        <h3 class="mb-3">Ожидание подтверждения</h3>
        <p class="text-muted mb-4">
          Здравствуйте, <strong>{{ user_login }}</strong>!<br>
          Ваша учетная запись еще не подтверждена администратором.
        </p>
        <div class="alert alert-custom">
          После подтверждения вам станут доступны все функции системы.
        </div>
        <a href="{% url 'logout' %}" class="btn btn-outline-secondary mt-3">
          <i class="bi bi-box-arrow-right"></i> Выйти
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
